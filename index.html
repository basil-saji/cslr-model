<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Neural Link | Upgrade Your Mind</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&family=VT323&family=Bungee+Shade&display=swap');

        /* --- MODERN AESTHETIC VARIABLES --- */
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --primary: #3b82f6;
            --accent: #8b5cf6;
            --font-main: 'Inter', sans-serif;
            --font-terminal: 'VT323', monospace;
            --font-prank: 'Bungee Shade', 'Comic Sans MS', cursive;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: all 0.5s ease;
        }

        /* --- MODERN UI COMPONENTS --- */
        #modern-ui {
            text-align: center;
            z-index: 10;
            position: relative;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem 4rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 600px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        p {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .btn {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            box-shadow: 0 10px 15px -3px rgba(139, 92, 246, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(139, 92, 246, 0.4);
        }

        /* Ambient Background Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: float 10s infinite ease-in-out alternate;
        }
        .orb-1 {
            width: 300px; height: 300px;
            background: var(--primary);
            top: -100px; left: -100px;
            opacity: 0.3;
        }
        .orb-2 {
            width: 400px; height: 400px;
            background: var(--accent);
            bottom: -150px; right: -100px;
            opacity: 0.2;
            animation-delay: -5s;
        }

        /* --- FAKE TERMINAL --- */
        #terminal-ui {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000;
            color: #0f0;
            font-family: var(--font-terminal);
            padding: 2rem;
            font-size: 1.5rem;
            z-index: 50;
        }

        /* --- CHAOS PRANK STYLES --- */
        body.chaos-mode {
            animation: rainbowBg 1s infinite, shake 0.5s infinite;
            font-family: 'Comic Sans MS', cursive !important;
        }

        .chaos-mode #modern-ui {
            display: none;
        }

        #prank-ui {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 100;
            pointer-events: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .chaos-mode #prank-ui {
            display: flex;
        }

        .prank-text {
            font-family: var(--font-prank);
            font-size: 6vw;
            color: #ff00ff;
            text-shadow: 5px 5px 0px #00ffff, -5px -5px 0px #ffff00;
            animation: spin 2s linear infinite;
            text-align: center;
        }

        .floating-meme {
            position: absolute;
            font-size: 3rem;
            animation: floatMeme 3s infinite linear;
        }

        /* --- ANIMATIONS --- */
        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        @keyframes rainbowBg {
            0% { background-color: red; }
            20% { background-color: orange; }
            40% { background-color: yellow; }
            60% { background-color: lime; }
            80% { background-color: blue; }
            100% { background-color: magenta; }
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        @keyframes spin {
            100% { transform: rotate(360deg) scale(1.5); }
        }

        @keyframes floatMeme {
            0% { transform: translateY(100vh) rotate(0deg); }
            100% { transform: translateY(-100vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <main id="modern-ui">
        <div class="glass-card">
            <h1>Quantum Neural Link</h1>
            <p>Download knowledge directly into your cerebral cortex. Powered by next-generation predictive AI and quantum threading. Start your free trial today.</p>
            <button id="cta-btn" class="btn">Initiate Brain Sync</button>
        </div>
    </main>

    <div id="terminal-ui"></div>

    <div id="prank-ui">
        <h1 class="prank-text">APRIL FOOLS!</h1>
        <div id="memes-container"></div>
    </div>

    <script>
        const btn = document.getElementById('cta-btn');
        const modernUi = document.getElementById('modern-ui');
        const terminalUi = document.getElementById('terminal-ui');
        const prankUi = document.getElementById('prank-ui');
        const memesContainer = document.getElementById('memes-container');

        let evasionCount = 0;
        const maxEvasions = 4; // Button runs away 4 times before letting them click

        // --- THE RUNAWAY BUTTON PRANK ---
        btn.addEventListener('mouseover', () => {
            if (evasionCount < maxEvasions) {
                // Change button to absolute positioning
                btn.style.position = 'fixed';
                
                // Calculate random positions within viewport bounds
                const x = Math.random() * (window.innerWidth - btn.offsetWidth);
                const y = Math.random() * (window.innerHeight - btn.offsetHeight);
                
                btn.style.left = `${x}px`;
                btn.style.top = `${y}px`;
                
                // Change text to mock the user slightly
                const texts = ["Too slow!", "Almost had it!", "Nope!", "Try again!"];
                btn.innerText = texts[evasionCount];
                
                evasionCount++;
            } else {
                btn.innerText = "Okay, fine. Click me.";
            }
        });

        // --- THE TRIGGER ---
        btn.addEventListener('click', () => {
            modernUi.style.display = 'none';
            document.querySelectorAll('.orb').forEach(orb => orb.style.display = 'none');
            startTerminalPrank();
        });

        // --- FAKE HACKER TERMINAL ---
        function startTerminalPrank() {
            terminalUi.style.display = 'block';
            
            const hackLines = [
                "Initializing Neural Link...",
                "Bypassing firewall...",
                "Accessing mainframe...",
                "Downloading brain data... [14%]",
                "Downloading brain data... [58%]",
                "Downloading brain data... [99%]",
                "ERROR: Brain not found.",
                "Initiating emergency protocol...",
                "OVERRIDE ENGAGED."
            ];

            let lineIndex = 0;
            
            function typeLine() {
                if (lineIndex < hackLines.length) {
                    const p = document.createElement('p');
                    p.innerText = "> " + hackLines[lineIndex];
                    terminalUi.appendChild(p);
                    lineIndex++;
                    
                    // Speed up the typing as it goes
                    setTimeout(typeLine, Math.max(200, 800 - (lineIndex * 100)));
                } else {
                    setTimeout(triggerChaos, 500);
                }
            }
            
            typeLine();
        }

        // --- ABSOLUTE CHAOS MODE ---
        function triggerChaos() {
            terminalUi.style.display = 'none';
            document.body.classList.add('chaos-mode');

            // Generate floating emojis/text everywhere
            const emojis = ["🤡", "🎉", "🤪", "👻", "🔥", "💾"];
            
            setInterval(() => {
                const el = document.createElement('div');
                el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                el.classList.add('floating-meme');
                
                // Randomize start position
                el.style.left = Math.random() * 100 + 'vw';
                el.style.fontSize = (Math.random() * 5 + 2) + 'rem';
                
                memesContainer.appendChild(el);
                
                // Cleanup to prevent lag
                setTimeout(() => el.remove(), 3000);
            }, 200);
        }
    </script>
</body>
</html>
